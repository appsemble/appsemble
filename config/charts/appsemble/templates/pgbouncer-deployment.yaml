{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appsemble.pgbouncer.fullname" . }}
  labels:
    {{ include "appsemble.labels" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
      app.kubernetes.io/name: {{ include "appsemble.name" . }}-pgbouncer
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/pgbouncer-configmap.yaml") . | sha256sum }}
        # The userlist secret is subPath-mounted, which kubelet never refreshes in a running pod.
        # Hash the live secret content so password rotations roll the pod. During offline rendering
        # (helm template) lookup returns nothing and the checksum is a stable constant.
        checksum/userlist: {{ (lookup "v1" "Secret" .Release.Namespace .Values.pgbouncer.auth.existingSecret).data | toYaml | sha256sum }}
      labels:
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/name: {{ include "appsemble.name" . }}-pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.service.port }}
          readinessProbe:
            tcpSocket:
              port: pgbouncer
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: pgbouncer-userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: {{ .Values.pgbouncer.auth.userlistKey }}
              readOnly: true
            # PgBouncer creates its unix socket in /tmp, which needs to be writable with the
            # read-only root filesystem.
            - name: tmp
              mountPath: /tmp
          {{- if .Values.postgresSSL }}
            - name: pgbouncer-tls
              mountPath: /etc/pgbouncer/tls
              readOnly: true
          {{- with .Values.pgbouncer.tls.client.caSecret }}
            - name: pgbouncer-client-ca
              mountPath: /etc/pgbouncer/client-ca
              readOnly: true
          {{- end }}
          {{- with .Values.pgbouncer.tls.server.caSecret }}
            - name: pgbouncer-server-ca
              mountPath: /etc/pgbouncer/server-ca
              readOnly: true
          {{- end }}
          {{- end }}
      volumes:
        - name: pgbouncer-config
          configMap:
            name: {{ include "appsemble.pgbouncer.fullname" . }}
        - name: pgbouncer-userlist
          secret:
            secretName: {{ .Values.pgbouncer.auth.existingSecret }}
        - name: tmp
          emptyDir: {}
      {{- if .Values.postgresSSL }}
        - name: pgbouncer-tls
          secret:
            secretName: {{ include "appsemble.pgbouncer.tlsSecretName" . }}
      {{- with .Values.pgbouncer.tls.client.caSecret }}
        - name: pgbouncer-client-ca
          secret:
            secretName: {{ . }}
      {{- end }}
      {{- with .Values.pgbouncer.tls.server.caSecret }}
        - name: pgbouncer-server-ca
          secret:
            secretName: {{ . }}
      {{- end }}
      {{- end }}
{{- end }}
