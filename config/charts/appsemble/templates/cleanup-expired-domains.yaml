apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "appsemble.fullname" . }}-cleanup-expired-domains
  labels:
    {{ include "appsemble.labels" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: '2'
spec:
  template:
    metadata:
      annotations:
        {{ include "appsemble.gitlab" . | indent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: {{ include "appsemble.fullname" . }}-cleanup-expired-domains
          image: "{{ .Values.image.repository }}:{{ include "appsemble.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
          args:
            - cleanup-expired-domains
            - -vv
          env:
{{ include "appsemble.postgres" . | indent 12 }}
            {{- if hasPrefix "review-" (include "appsemble.fullname" .) }}
            - name: SMTP_HOST
              value: "{{ include "appsemble.fullname" . }}-mailpit-smtp"
            {{- else }}
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtpSecret  | quote }}
                  key: host
            {{- end }}
            {{- with .Values.smtpSecret }}
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: port
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: secure
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: pass
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: from
            {{- end }}
            {{- with .Values.imapSecret }}
            - name: IMAP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-host
            - name: IMAP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-port
            - name: IMAP_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-secure
            - name: IMAP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-user
            - name: IMAP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-pass
            - name: IMAP_COPY_TO_SENT_FOLDER
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: imap-copy-to-sent-folder
            {{- end }}
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
