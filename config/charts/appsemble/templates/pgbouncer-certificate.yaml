{{- if and .Values.pgbouncer.enabled .Values.postgresSSL .Values.pgbouncer.tls.autoGenerated (not .Values.pgbouncer.tls.existingSecret) }}
{{- $secretName := include "appsemble.pgbouncer.tlsSecretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $serviceName := include "appsemble.pgbouncer.fullname" . }}
{{- $dnsNames := list $serviceName (printf "%s.%s" $serviceName .Release.Namespace) (printf "%s.%s.svc" $serviceName .Release.Namespace) (printf "%s.%s.svc.cluster.local" $serviceName .Release.Namespace) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{ include "appsemble.labels" . }}
type: kubernetes.io/tls
data:
{{- if $existingSecret }}
  tls.crt: {{ get $existingSecret.data "tls.crt" }}
  tls.key: {{ get $existingSecret.data "tls.key" }}
{{- else }}
{{- $certificate := genSelfSignedCert $serviceName nil $dnsNames 3650 }}
  tls.crt: {{ $certificate.Cert | b64enc }}
  tls.key: {{ $certificate.Key | b64enc }}
{{- end }}
{{- end }}
