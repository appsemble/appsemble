apiVersion: v2
name: appsemble
version: 0.37.0
appVersion: 0.37.0
kubeVersion: '>=1.21.0'
type: application
description: The open source low-code app building platform
icon: https://charts.appsemble.com/icon.svg
home: https://appsemble.com
keywords:
  - app
  - apps
  - appsemble
  - framework
  - low-code
  - lowcode
sources:
  - https://gitlab.com/appsemble/appsemble
  - https://gitlab.com/appsemble/charts
dependencies:
  - name: postgresql
    version: 16.7.27
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mailpit
    version: 0.34.1
    repository: https://jouve.github.io/charts
    condition: mailpit.enabled
  - name: minio
    version: 14.10.5
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: valkey
    version: 0.9.4
    repository: https://valkey.io/valkey-helm
    condition: valkey.enabled
annotations:
  artifacthub.io/changes: >
    - kind: added
      description: "Block(form): Add minRows option to the markdown field to set the
        editor's minimum height in lines."
    - kind: added
      description: "Block(list): Add openPreview option to image fields to trigger the
        item's action instead of opening a fullscreen preview."
    - kind: changed
      description: "App: Expose URL query parameters to block page parameters."
    - kind: changed
      description: "Service-worker: Append utm_source=notification to URLs opened from
        notification clicks."
    - kind: changed
      description: "Web-utils: Stop reporting failed requests that never reached the
        server to Sentry."
    - kind: fixed
      description: "Block(data-loader): Drop the result of a data load when a newer
        load started meanwhile, so rapid refreshes no longer overwrite newer data
        with stale responses."
    - kind: fixed
      description: "Block(filter): Drop the result of a filter load when a newer load
        started meanwhile, so rapid interactions no longer overwrite newer data with
        stale responses."
    - kind: fixed
      description: "App: Remove a block's event listeners and disable its emitters
        when the block is unmounted, so blocks from a previously shown tab or page
        can no longer receive or emit events on the current one."
    - kind: fixed
      description: "App: Stop the event action from emitting once its block or page is
        unmounted, so slow action chains started on a previous tab or page no longer
        overwrite the current view, while their remaining work such as resource
        writes still completes."
    - kind: fixed
      description: "Cli: Convert local file paths to file URLs on Windows."
    - kind: fixed
      description: "Node-utils: Apply resource schema property defaults when creating
        or replacing resources."
    - kind: fixed
      description: "Server: Order resource positions within the group set by
        enforceOrderingGroupByFields."
    - kind: fixed
      description: "Server: Reject resource creation, update, and patch requests that
        reference non-existent resources."
    - kind: fixed
      description: "Server: Strip the id metadata field from the stored resource data
        on create, update, and patch."
  artifacthub.io/license: LGPL-3.0-only
  artifacthub.io/links: |
    - name: Appsemble Studio
      url: https://appsemble.app
    - name: Documentation
      url: https://appsemble.app/docs
    - name: support
      url: https://gitlab.com/appsemble/appsemble/-/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/container/appsemble/appsemble
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager
    - url: https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
  artifacthub.io/signKey: |
    fingerprint: C4EE8EE8B16EE94FEA3B0A7C346FF2248F310B53
    url: https://gitlab.com/appsemble-bot.gpg
