apiVersion: v2
name: appsemble
version: 0.36.10-test.4
appVersion: 0.36.10-test.4
kubeVersion: '>=1.21.0'
type: application
description: The open source low-code app building platform
icon: https://charts.appsemble.com/icon.svg
home: https://appsemble.com
keywords:
  - app
  - apps
  - appsemble
  - framework
  - low-code
  - lowcode
sources:
  - https://gitlab.com/appsemble/appsemble
  - https://gitlab.com/appsemble/charts
dependencies:
  - name: postgresql
    version: 16.7.27
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mailpit
    version: 0.32.5
    repository: https://jouve.github.io/charts
    condition: mailpit.enabled
  - name: minio
    version: 14.10.5
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: valkey
    version: 0.9.4
    repository: https://valkey.io/valkey-helm
    condition: valkey.enabled
annotations:
  artifacthub.io/changes: >
    - kind: added
      description: "Block(form): Add disableNativePicker option to date fields to keep
        the Appsemble picker on mobile."
    - kind: added
      description: "Block(form): Add disabled property to date picker decorations to
        make their date unselectable."
    - kind: fixed
      description: "Block(form): Fix a self.config is undefined crash when a date
        field's constraints change, by updating the flatpickr instance in place
        instead of recreating it."
    - kind: fixed
      description: "Block(form): In date fields, set the default value to undefined if
        today falls under one of the disabled days."
    - kind: fixed
      description: "Preact-components: Render the date picker with flatpickr instead
        of the native mobile picker by default."
  artifacthub.io/license: LGPL-3.0-only
  artifacthub.io/links: |
    - name: Appsemble Studio
      url: https://appsemble.app
    - name: Documentation
      url: https://appsemble.app/docs
    - name: support
      url: https://gitlab.com/appsemble/appsemble/-/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/container/appsemble/appsemble
    - url: https://artifacthub.io/packages/helm/cert-manager/cert-manager
    - url: https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
  artifacthub.io/signKey: |
    fingerprint: C4EE8EE8B16EE94FEA3B0A7C346FF2248F310B53
    url: https://gitlab.com/appsemble-bot.gpg
