[databases]
appsemble = host=postgres-dev port=5432 dbname=appsemble pool_size=5
* = host=postgres-dev port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
admin_users = admin
stats_users = admin

pool_mode = session
max_client_conn = 100
default_pool_size = 5
min_pool_size = 0
reserve_pool_size = 1
server_idle_timeout = 30
server_lifetime = 3600
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 5

ignore_startup_parameters = extra_float_digits
